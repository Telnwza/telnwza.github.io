<script>
(function uxLayer(){
  "use strict";
  const UX_FAV_KEY="schstudio.ux.favorites";
  const UX_REC_KEY="schstudio.ux.recent";
  const UX_COLLAPSE_KEY="schstudio.ux.groups";
  const uxLoad=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(_){return d}};
  const uxSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}};
  let uxFavorites=new Set(uxLoad(UX_FAV_KEY,[]));
  let uxRecent=uxLoad(UX_REC_KEY,[]);
  let uxCollapsed=new Set(uxLoad(UX_COLLAPSE_KEY,[]));
  let uxIssueFilter="all", uxIssueIndex=-1, uxDirty=false;

  /* Top-level view controls */
  const uxTopbar=document.querySelector(".topbar");
  const uxViewButtons=document.createElement("div");
  uxViewButtons.style.cssText="display:flex;gap:3px;margin-left:2px";
  uxViewButtons.innerHTML=`<button class="btn btn-ghost ux-top-btn" data-ux="save" title="ดาวน์โหลดไฟล์สำรองโปรเจกต์ (Ctrl+S)">💾</button><button class="btn btn-ghost ux-top-btn" data-ux="left" title="ซ่อน/แสดงแผงซ้าย">◧</button><button class="btn btn-ghost ux-top-btn" data-ux="right" title="ซ่อน/แสดงแผงขวา">◨</button><button class="btn btn-ghost ux-top-btn" data-ux="focus" title="เต็มพื้นที่วาด (F11)">⛶</button><button class="btn btn-ghost ux-top-btn" data-ux="keys" title="คีย์ลัด (?)">?</button>`;
  uxTopbar.insertBefore(uxViewButtons,uxTopbar.querySelector(".grow"));
  const uxWorkspace=document.querySelector(".workspace");
  uxViewButtons.addEventListener("click",e=>{
    const a=e.target.closest("[data-ux]"); if(!a)return;
    if(a.dataset.ux==="save")saveProjectToFile();
    if(a.dataset.ux==="left")uxWorkspace.classList.toggle("ux-left-hidden");
    if(a.dataset.ux==="right")uxWorkspace.classList.toggle("ux-right-hidden");
    if(a.dataset.ux==="focus")document.body.classList.toggle("ux-focus");
    if(a.dataset.ux==="keys")uxShowShortcuts();
    setTimeout(()=>{try{render()}catch(_){}},210);
  });

  function uxShowShortcuts(){
    const rows=[["เลือก/ยกเลิกเครื่องมือ","Esc"],["วาดสาย","W"],["ตั้งชื่อสาย","N"],["ติด I/O marker","I"],["หมุนตามเข็ม","R"],["หมุนทวนเข็ม","Shift + R"],["พลิกซ้าย–ขวา","M"],["คัดลอก / วาง","Ctrl+C / Ctrl+V"],["ทำสำเนา","Ctrl+D"],["ย้อนกลับ / ทำซ้ำ","Ctrl+Z / Ctrl+Y"],["ลบสิ่งที่เลือก","Delete"],["ตรวจวงจร","F7"],["พอดีหน้าจอ","Home"],["เต็มพื้นที่วาด","F11"],["เปิดรายการนี้","?"]];
    const bg=document.createElement("div"); bg.className="modal-bg";
    bg.innerHTML=`<div class="modal"><h2>⌨ คีย์ลัด <button class="close">×</button></h2><div class="modal-body"><div class="ux-shortcuts">${rows.map(r=>`<div class="ux-shortcut"><span>${r[0]}</span><kbd>${r[1]}</kbd></div>`).join("")}</div></div><div class="modal-foot"><button class="btn btn-primary">ปิด</button></div></div>`;
    document.querySelector("#modalRoot").appendChild(bg);
    bg.querySelectorAll(".close,.modal-foot button").forEach(b=>b.onclick=()=>bg.remove());
    bg.addEventListener("click",e=>{if(e.target===bg)bg.remove()});
  }

  /* Palette search, favorites, recent items and collapsible groups */
  function uxRecordRecent(type){
    uxRecent=[type,...uxRecent.filter(x=>x!==type)].slice(0,6); uxSave(UX_REC_KEY,uxRecent); uxDrawRecent();
  }
  function uxDrawRecent(){
    const box=document.querySelector(".ux-recent"); if(!box)return;
    box.innerHTML=uxRecent.filter(t=>TYPES[t]).map(t=>`<button data-ux-add="${t}" title="วาง ${esc(TYPES[t].label)}">${esc(TYPES[t].label)}</button>`).join("");
  }
  function uxDecoratePalette(){
    const root=document.querySelector("#palettePane");
    const pal=root&&root.querySelector(".palette"); if(!pal||pal.dataset.uxReady)return;
    pal.dataset.uxReady="1";
    const head=document.createElement("div"); head.className="ux-palette-head";
    head.innerHTML=`<div class="ux-search-wrap"><input class="ux-search" placeholder="ค้นหา component…" aria-label="ค้นหา component"><button class="btn ux-fav-toggle" title="แสดงเฉพาะรายการโปรด">★</button></div><div class="ux-recent"></div>`;
    pal.prepend(head); uxDrawRecent();
    root.querySelectorAll(".pal-group").forEach(g=>{
      const name=g.querySelector("h4")?.textContent.trim()||"";
      if(uxCollapsed.has(name))g.classList.add("ux-collapsed");
      g.querySelector("h4")?.addEventListener("click",()=>{g.classList.toggle("ux-collapsed"); const names=[...root.querySelectorAll(".pal-group.ux-collapsed h4")].map(x=>x.textContent.trim()); uxCollapsed=new Set(names); uxSave(UX_COLLAPSE_KEY,names)});
    });
    root.querySelectorAll(".ptile").forEach(tile=>{
      const star=document.createElement("button"); star.className="ux-star"+(uxFavorites.has(tile.dataset.pal)?" on":""); star.textContent="★"; star.title="เพิ่ม/เอาออกจากรายการโปรด";
      star.onclick=e=>{e.stopPropagation(); const t=tile.dataset.pal; uxFavorites.has(t)?uxFavorites.delete(t):uxFavorites.add(t); uxSave(UX_FAV_KEY,[...uxFavorites]); star.classList.toggle("on",uxFavorites.has(t)); uxApplyPaletteFilter()};
      tile.appendChild(star);
      tile.addEventListener("click",()=>uxRecordRecent(tile.dataset.pal));
      tile.addEventListener("dragstart",()=>uxRecordRecent(tile.dataset.pal));
      tile.title=`${TYPES[tile.dataset.pal]?.label||tile.dataset.pal} — คลิกเพื่อวางกลางจอ หรือลากไปยังตำแหน่งที่ต้องการ`;
    });
    head.querySelector(".ux-search").addEventListener("input",uxApplyPaletteFilter);
    head.querySelector(".ux-fav-toggle").addEventListener("click",e=>{e.currentTarget.classList.toggle("active");uxApplyPaletteFilter()});
    head.addEventListener("click",e=>{const b=e.target.closest("[data-ux-add]");if(!b)return;const tile=root.querySelector(`.ptile[data-pal="${b.dataset.uxAdd}"]`);tile?.click()});
  }
  function uxApplyPaletteFilter(){
    const root=document.querySelector("#palettePane"), q=(root.querySelector(".ux-search")?.value||"").trim().toLowerCase(), favOnly=root.querySelector(".ux-fav-toggle")?.classList.contains("active");
    let shown=0;
    root.querySelectorAll(".ptile").forEach(t=>{const ok=(!q||(t.textContent+" "+t.dataset.pal).toLowerCase().includes(q))&&(!favOnly||uxFavorites.has(t.dataset.pal));t.classList.toggle("ux-filtered",!ok);if(ok)shown++});
    root.querySelectorAll(".pal-group").forEach(g=>g.classList.toggle("ux-empty",![...g.querySelectorAll(".ptile")].some(t=>!t.classList.contains("ux-filtered"))));
    let empty=root.querySelector(".ux-no-results"); if(!shown&&!empty){empty=document.createElement("div");empty.className="ux-no-results";empty.textContent="ไม่พบ component ที่ค้นหา";root.querySelector(".palette")?.appendChild(empty)} else if(shown&&empty)empty.remove();
  }
  const uxBaseRenderPalette=renderPalette;
  renderPalette=function(){uxBaseRenderPalette();uxDecoratePalette()};
  uxDecoratePalette();

  const uxDragBadge=document.createElement("div");uxDragBadge.className="ux-drag-badge";document.body.appendChild(uxDragBadge);
  const uxDropHost=document.querySelector(".canvas-host");
  document.addEventListener("dragstart",e=>{const tile=e.target.closest?.(".ptile");if(!tile)return;uxDragBadge.textContent=`วาง ${TYPES[tile.dataset.pal]?.label||tile.dataset.pal}`;uxDragBadge.classList.add("show")});
  document.addEventListener("dragover",e=>{if(!uxDragBadge.classList.contains("show"))return;uxDragBadge.style.left=(e.clientX+14)+"px";uxDragBadge.style.top=(e.clientY+14)+"px";uxDropHost.classList.toggle("ux-drop-ready",uxDropHost.contains(e.target))});
  document.addEventListener("dragend",()=>{uxDragBadge.classList.remove("show");uxDropHost.classList.remove("ux-drop-ready")});
  uxDropHost.addEventListener("drop",()=>{uxDragBadge.classList.remove("show");uxDropHost.classList.remove("ux-drop-ready")});

  /* Floating quick actions */
  const uxQuick=document.createElement("div"); uxQuick.className="ux-quickbar";
  uxQuick.innerHTML=`<span class="ux-q-label">Selected</span><button data-q="rotate" title="หมุน (R)">↻ หมุน</button><button data-q="mirror" title="พลิก (M)">⇋ พลิก</button><button data-q="dup" title="ทำสำเนา (Ctrl+D)">⎘ สำเนา</button><button data-q="props" title="เปิด Inspector">⚙ Properties</button><button class="danger" data-q="delete" title="ลบ (Del)">🗑</button>`;
  document.querySelector(".canvas-host .overlay").appendChild(uxQuick);
  uxQuick.addEventListener("click",e=>{const q=e.target.closest("[data-q]")?.dataset.q;if(!q)return;if(q==="rotate")rotateSelection(1);if(q==="mirror")mirrorSelection();if(q==="dup")duplicateSelection();if(q==="delete")deleteSelection();if(q==="props")setRightTab("inspector")});
  function uxUpdateQuick(){
    const n=state.selection.size; uxQuick.classList.toggle("show",n>0);
    if(!n)return; const id=[...state.selection][0], c=comp(id), w=activeSch()?.wires.find(x=>x.id===id);
    uxQuick.querySelector(".ux-q-label").textContent=n>1?`${n} รายการ`:(c?(typeDef(c)?.label||c.type):(w?"Wire":"Selected"));
    uxQuick.querySelector('[data-q="rotate"]').style.display=c&&orientable(c)?"":"none";
    uxQuick.querySelector('[data-q="mirror"]').style.display=c&&orientable(c)?"":"none";
  }

  /* Inspector grouping and safe reset to component defaults */
  function uxDecorateInspector(){
    const root=document.querySelector("#inspectorPane .insp"); if(!root||root.dataset.uxReady)return; root.dataset.uxReady="1";
    const rows=[...root.querySelectorAll(":scope > .row")]; if(!rows.length)return;
    const first=document.createElement("div");first.className="ux-section-title";first.textContent="General";root.insertBefore(first,rows[0]);
    const paramStart=rows.find(r=>!/(Position|ทิศทาง|เส้นทาง|Top entity|Name)/i.test(r.querySelector("label")?.textContent||""));
    if(paramStart){const h=document.createElement("div");h.className="ux-section-title";h.textContent="Parameters";root.insertBefore(h,paramStart)}
    root.querySelectorAll('input[type="number"]').forEach(i=>{if(i.min||i.max)i.title=`ค่าที่ใช้ได้: ${i.min||"−∞"} ถึง ${i.max||"∞"}`});
    if(state.selection.size===1){const c=comp([...state.selection][0]);const td=c&&typeDef(c);if(c&&td&&td.defaultParams){const acts=document.createElement("div");acts.className="ux-inspector-actions";acts.innerHTML='<button class="btn" data-ux-reset>↺ Reset defaults</button><button class="btn" data-ux-center>◎ Center</button>';root.appendChild(acts);acts.querySelector("[data-ux-reset]").onclick=()=>{if(!confirm("คืนค่าพารามิเตอร์ของ component นี้เป็นค่าเริ่มต้น? (Undo ได้)"))return;const keepName=c.params?.name;c.params=JSON.parse(JSON.stringify(td.defaultParams||{}));if(keepName!=null&&("name" in c.params))c.params.name=keepName;snapshot();render();renderInspector();toast("คืนค่าพารามิเตอร์แล้ว","ok")};acts.querySelector("[data-ux-center]").onclick=()=>uxCenterSelection()}}
  }
  const uxBaseRenderInspector=renderInspector;
  renderInspector=function(){uxBaseRenderInspector();uxDecorateInspector();uxUpdateQuick()};

  /* Issue filters, navigation and badge */
  function uxDecorateIssues(){
    const root=document.querySelector("#errorsPane");if(!root||root.querySelector(".ux-issuebar"))return;
    const items=[...root.querySelectorAll(".err-item")];
    const errors=items.filter(x=>!x.classList.contains("warn")&&!x.classList.contains("info")).length,warns=items.filter(x=>x.classList.contains("warn")).length;
    const bar=document.createElement("div");bar.className="ux-issuebar";bar.innerHTML=`<button data-if="all">ทั้งหมด ${items.length}</button><button data-if="err">Error ${errors}</button><button data-if="warn">Warning ${warns}</button><span class="grow"></span><button class="nav" data-inav="prev" title="ก่อนหน้า">‹</button><button class="nav" data-inav="next" title="ถัดไป">›</button>`;root.prepend(bar);
    bar.addEventListener("click",e=>{const f=e.target.closest("[data-if]")?.dataset.if;if(f){uxIssueFilter=f;uxIssueIndex=-1;uxApplyIssueFilter()}const n=e.target.closest("[data-inav]")?.dataset.inav;if(n)uxNavigateIssue(n==="next"?1:-1)});
    const tab=document.querySelector('[data-rtab="errors"]');let badge=tab.querySelector(".ux-badge");if(items.length){if(!badge){badge=document.createElement("span");badge.className="ux-badge";tab.appendChild(badge)}badge.textContent=items.length}else badge?.remove();uxApplyIssueFilter();
  }
  function uxApplyIssueFilter(){
    const root=document.querySelector("#errorsPane");root.querySelectorAll(".ux-issuebar [data-if]").forEach(b=>b.classList.toggle("active",b.dataset.if===uxIssueFilter));
    root.querySelectorAll(".err-item").forEach(x=>{const type=x.classList.contains("warn")?"warn":x.classList.contains("info")?"info":"err";x.classList.toggle("ux-hidden-issue",uxIssueFilter!=="all"&&uxIssueFilter!==type)});
  }
  function uxNavigateIssue(dir){const a=[...document.querySelectorAll("#errorsPane .err-item:not(.ux-hidden-issue)")];if(!a.length)return;uxIssueIndex=(uxIssueIndex+dir+a.length)%a.length;a[uxIssueIndex].scrollIntoView({block:"center",behavior:"smooth"});a[uxIssueIndex].click()}
  const uxBaseRenderErrors=renderErrors;
  renderErrors=function(list){uxBaseRenderErrors(list);uxDecorateIssues()};
  uxDecorateIssues();

  /* Minimap and view helpers */
  const uxMap=document.createElement("div");uxMap.className="ux-minimap";uxMap.innerHTML='<span class="ux-map-title">OVERVIEW</span><svg viewBox="0 0 170 108" preserveAspectRatio="xMidYMid meet"></svg>';document.querySelector(".canvas-host .overlay").appendChild(uxMap);

  @media(max-width:900px){.workspace{--activity-w:38px;--left-w:210px;--right-w:280px}.ux-activity{width:38px;min-width:38px}.ux-activity button{width:37px}.ux-command{width:560px}.ux-quickbar button{font-size:10px;padding:4px 5px}}

<script>
(function workbenchV2(){

  };

  workspace.insertBefore(rail,leftPane);

  const dockTitle=document.createElement("div");dockTitle.className="ux-left-dock-title";dockTitle.innerHTML='<span>Project</span><span class="grow"></span><button title="Hide panel">×</button>';leftPane.insertBefore(dockTitle,leftPane.querySelector(".pane-body"));
  dockTitle.querySelector("button").onclick=()=>{workspace.classList.add("ux-left-hidden");wbSave();updateRail()};
  const currentLeft=()=>document.querySelector('.pane:not(.right) .pane-tabs button.active')?.dataset.ltab||"project";

  function updateRail(){

    if(workspace.classList.contains("ux-left-hidden"))l?.classList.add("dock-off");if(workspace.classList.contains("ux-right-hidden"))r?.classList.add("dock-off");

  }
  const wbBaseSetLeftTab=setLeftTab;setLeftTab=function(name){const out=wbBaseSetLeftTab(name);dockTitle.querySelector("span").textContent=name==="palette"?"Components":"Project";updateRail();return out};
  const wbBaseSetRightTab=setRightTab;setRightTab=function(name){const out=wbBaseSetRightTab(name);updateRail();return out};
  rail.addEventListener("click",e=>{
    const action=e.target.closest("[data-rail]")?.dataset.rail;if(!action)return;

  /* Drag-to-resize side docks, with double-click reset. */
  const leftSplit=document.createElement("div"),rightSplit=document.createElement("div");leftSplit.className="ux-splitter left";rightSplit.className="ux-splitter right";workspace.append(leftSplit,rightSplit);
  function bindResize(split,side){

      const move=ev=>{if(side==="left")wb.left=clampW(ev.clientX-rect.left-42,190,440);else wb.right=clampW(rect.right-ev.clientX,260,520);workspace.style.setProperty(side==="left"?"--left-w":"--right-w",wb[side]+"px")};

    split.addEventListener("dblclick",()=>{wb[side]=side==="left"?248:352;workspace.style.setProperty(side==="left"?"--left-w":"--right-w",wb[side]+"px");wbSave();render();showLayoutNote("Panel size reset")});
  }
  bindResize(leftSplit,"left");bindResize(rightSplit,"right");

  /* Extra layout actions on the existing context toolbar. */
  const quick=document.querySelector(".ux-quickbar");
  quick.insertAdjacentHTML("beforeend",'<span class="ux-context-sep"></span><button data-layout="left" title="Align left">Left</button><button data-layout="right" title="Align right">Right</button><button data-layout="top" title="Align top">Top</button><button data-layout="bottom" title="Align bottom">Bottom</button><button data-layout="dist-x" title="Distribute horizontally">Space H</button><button data-layout="dist-y" title="Distribute vertically">Space V</button>');
  const layoutNote=document.createElement("div");layoutNote.className="ux-layout-toast";canvasArea.querySelector(".canvas-host .overlay").appendChild(layoutNote);let noteTimer;
  function showLayoutNote(s){layoutNote.textContent=s;layoutNote.classList.add("show");clearTimeout(noteTimer);noteTimer=setTimeout(()=>layoutNote.classList.remove("show"),1300)}
  function selectedComps(){return [...state.selection].map(id=>comp(id)).filter(c=>c&&c.type!=="JUNCTION")}
  function finishLayout(cs,msg){const ids=new Set(cs.map(c=>c.id));activeSch().wires.forEach(w=>{if(ids.has(w.from.cid)||ids.has(w.to.cid)){delete w.mx;delete w.my}});snapshot();render();renderInspector();showLayoutNote(msg)}
  function alignSelection(kind){const cs=selectedComps();if(cs.length<2)return;if(kind==="left"){const x=Math.min(...cs.map(c=>c.x));cs.forEach(c=>c.x=x)}else if(kind==="right"){const x=Math.max(...cs.map(c=>c.x+getSize(c).w));cs.forEach(c=>c.x=x-getSize(c).w)}else if(kind==="top"){const y=Math.min(...cs.map(c=>c.y));cs.forEach(c=>c.y=y)}else{const y=Math.max(...cs.map(c=>c.y+getSize(c).h));cs.forEach(c=>c.y=y-getSize(c).h)}finishLayout(cs,"Aligned "+kind)}
  function distribute(axis){const cs=selectedComps();if(cs.length<3){toast("เลือกอย่างน้อย 3 components เพื่อจัดระยะ","info");return}if(axis==="x"){cs.sort((a,b)=>a.x-b.x);const first=cs[0],last=cs[cs.length-1],start=first.x,end=last.x+getSize(last).w,total=cs.reduce((s,c)=>s+getSize(c).w,0),gap=Math.max(GRID,(end-start-total)/(cs.length-1));let x=start;cs.forEach(c=>{c.x=snap(x);x+=getSize(c).w+gap})}else{cs.sort((a,b)=>a.y-b.y);const first=cs[0],last=cs[cs.length-1],start=first.y,end=last.y+getSize(last).h,total=cs.reduce((s,c)=>s+getSize(c).h,0),gap=Math.max(GRID,(end-start-total)/(cs.length-1));let y=start;cs.forEach(c=>{c.y=snap(y);y+=getSize(c).h+gap})}finishLayout(cs,axis==="x"?"Distributed horizontally":"Distributed vertically")}
  quick.addEventListener("click",e=>{const a=e.target.closest("[data-layout]")?.dataset.layout;if(["left","right","top","bottom"].includes(a))alignSelection(a);if(a==="dist-x")distribute("x");if(a==="dist-y")distribute("y")});
  function updateContext(){const n=selectedComps().length;quick.classList.toggle("multi",n>=2);quick.classList.toggle("many",n>=3)}

  /* Clickable minimap navigation. */
  const mapSvg=document.querySelector(".ux-minimap svg");
  mapSvg?.addEventListener("click",e=>{const vb=(mapSvg.getAttribute("viewBox")||"").split(/\s+/).map(Number);if(vb.length!==4||vb.some(Number.isNaN))return;const r=mapSvg.getBoundingClientRect(),x=vb[0]+(e.clientX-r.left)/r.width*vb[2],y=vb[1]+(e.clientY-r.top)/r.height*vb[3],cr=canvas.getBoundingClientRect();state.view.x=cr.width/2-x*state.view.k;state.view.y=cr.height/2-y*state.view.k;render()});

  /* Searchable command palette, including illustrated component insertion. */
  let cmdBg=null,cmdActive=0;
  function componentCommand(type){const td=TYPES[type],p=td.defaultParams||{},sz=td.size(p);return{id:"add-"+type,name:"Add "+td.label,keywords:"component gate "+type,group:"Component",icon:`<svg viewBox="0 0 ${sz.w} ${sz.h}" preserveAspectRatio="xMidYMid meet">${td.shape(p)}</svg>`,run:()=>{const r=canvas.getBoundingClientRect(),x=(r.width/2-state.view.x)/state.view.k,y=(r.height/2-state.view.y)/state.view.k;addComp(type,x-35,y-25)}}}
  function commandList(){const base=[
    {name:"Generate VHDL",keywords:"code export build",group:"Action",run:generateVHDL},{name:"Run schematic check",keywords:"issues validate synthesis",group:"Action",run:runSynthesis},{name:"Fit schematic to view",keywords:"zoom all home",group:"View",run:zoomFit},{name:"Center selection",keywords:"zoom selected focus",group:"View",run:()=>{document.querySelector('[data-ux-canvas="center"]')?.click()}},{name:"Open Project panel",keywords:"left files",group:"View",run:()=>{workspace.classList.remove("ux-left-hidden");setLeftTab("project")}},{name:"Open Components panel",keywords:"left library gates",group:"View",run:()=>{workspace.classList.remove("ux-left-hidden");setLeftTab("palette")}},{name:"Open Inspector",keywords:"right properties",group:"View",run:()=>{workspace.classList.remove("ux-right-hidden");setRightTab("inspector")}},{name:"Open Issues",keywords:"right error warning",group:"View",run:()=>{workspace.classList.remove("ux-right-hidden");setRightTab("errors")}},{name:"Open VHDL",keywords:"right code",group:"View",run:()=>{workspace.classList.remove("ux-right-hidden");setRightTab("vhdl")}},{name:"Save project backup",keywords:"download json",group:"File",run:saveProjectToFile}
  ];return [...base,...Object.keys(TYPES).filter(t=>TYPES[t].category!=="utility").map(componentCommand)]}
  function openCommandPalette(){
    if(cmdBg){cmdBg.querySelector("input")?.focus();return}cmdActive=0;cmdBg=document.createElement("div");cmdBg.className="modal-bg ux-command-bg";cmdBg.innerHTML=`<div class="ux-command"><div class="ux-command-search">${svgIcon.search}<input placeholder="Search commands or components…" autocomplete="off" spellcheck="false"><kbd>ESC</kbd></div><div class="ux-command-results"></div></div>`;document.querySelector("#modalRoot").appendChild(cmdBg);const input=cmdBg.querySelector("input"),results=cmdBg.querySelector(".ux-command-results"),commands=commandList();
    const draw=()=>{const words=input.value.toLowerCase().trim().split(/\s+/).filter(Boolean),list=commands.filter(c=>words.every(w=>(c.name+" "+c.keywords+" "+c.group).toLowerCase().includes(w))).slice(0,14);cmdActive=Math.min(cmdActive,Math.max(0,list.length-1));results.innerHTML=list.length?list.map((c,i)=>`<div class="ux-command-item ${i===cmdActive?"active":""}" data-ci="${commands.indexOf(c)}"><span class="ux-command-icon">${c.icon||'<span>›</span>'}</span><span class="ux-command-name">${esc(c.name)}</span><span class="ux-command-hint">${esc(c.group)}</span></div>`).join(""):'<div class="ux-command-empty">No matching command</div>'};
    const close=()=>{cmdBg?.remove();cmdBg=null};const run=i=>{const c=commands[i];close();if(c){c.run();updateRail();wbSave()}};
    input.addEventListener("input",()=>{cmdActive=0;draw()});input.addEventListener("keydown",e=>{const items=[...results.querySelectorAll("[data-ci]")];if(e.key==="ArrowDown"){e.preventDefault();cmdActive=Math.min(cmdActive+1,items.length-1);draw()}else if(e.key==="ArrowUp"){e.preventDefault();cmdActive=Math.max(0,cmdActive-1);draw()}else if(e.key==="Enter"&&items.length){e.preventDefault();run(+items[cmdActive].dataset.ci)}else if(e.key==="Escape"){e.preventDefault();close()}});results.addEventListener("mousemove",e=>{const item=e.target.closest("[data-ci]");if(!item)return;const all=[...results.querySelectorAll("[data-ci]")],idx=all.indexOf(item);if(idx!==cmdActive){cmdActive=idx;draw()}});results.addEventListener("click",e=>{const item=e.target.closest("[data-ci]");if(item)run(+item.dataset.ci)});cmdBg.addEventListener("mousedown",e=>{if(e.target===cmdBg)close()});draw();setTimeout(()=>input.focus(),0)

<!-- Motion layer: restrained, state-driven animation with reduced-motion support -->
<style id="functionalMotion">
  :root{--motion-fast:110ms;--motion-ui:165ms;--motion-panel:190ms;--motion-ease:cubic-bezier(.2,.75,.25,1);--toast-ms:2400ms}

  .workspace>.pane{opacity:1;transition:opacity var(--motion-ui) ease,transform var(--motion-panel) var(--motion-ease)}
  .workspace.ux-left-hidden>.pane:not(.right),.workspace.ux-right-hidden>.pane.right{visibility:visible!important;pointer-events:none;opacity:0}

  .ux-activity button::before{content:"";position:absolute;left:-2px;top:50%;width:2px;height:0;background:#64a2ff;border-radius:0 2px 2px 0;transform:translateY(-50%);transition:height var(--motion-ui) var(--motion-ease),box-shadow var(--motion-ui)}

  .ux-quickbar button,.canvas-toolbar button,.canvas-tools button,.btn,.ptile,.tree-item,.err-item{transition-property:background-color,border-color,color,opacity,transform,box-shadow;transition-duration:var(--motion-fast);transition-timing-function:ease-out}

  @keyframes componentEnter{0%{opacity:0;filter:brightness(1.8) drop-shadow(0 0 7px #6faaff)}55%{opacity:1;filter:brightness(1.15) drop-shadow(0 0 4px #6faaff)}100%{opacity:1;filter:none}}

  .node.motion-new{animation:componentEnter 260ms var(--motion-ease) both}

  @keyframes portReady{0%,100%{filter:drop-shadow(0 0 0 transparent);opacity:.72}50%{filter:drop-shadow(0 0 4px #70aaff);opacity:1}}
  body.ux-wiring-active .port:not(.pending) .port-dot{animation:portReady 920ms ease-in-out infinite}

  @keyframes wireMarch{to{stroke-dashoffset:-20}}

  .wire-group:hover .wire{stroke-dasharray:8 3;animation:wireMarch 700ms linear infinite}
  .wire-group:hover .wire.bus{stroke-dasharray:12 4}

  @keyframes issueEnter{from{opacity:0;transform:translateX(7px)}to{opacity:1;transform:translateX(0)}}
  @keyframes errorNudge{0%,100%{transform:translateX(0)}35%{transform:translateX(-2px)}70%{transform:translateX(2px)}}
  .err-item.motion-issue{animation:issueEnter 190ms var(--motion-ease) both}
  .err-item.motion-issue:not(.warn):not(.info){animation:issueEnter 190ms var(--motion-ease) both,errorNudge 210ms 190ms ease-out}

  @keyframes toastIn{from{opacity:0;transform:translateX(12px) scale(.98)}to{opacity:1;transform:translateX(0) scale(1)}}
  @keyframes toastTimer{from{transform:scaleX(1)}to{transform:scaleX(0)}}
  .toast{position:relative;overflow:hidden;animation:toastIn 180ms var(--motion-ease) both}
  .toast::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--accent);transform-origin:left;animation:toastTimer var(--toast-ms) linear both;opacity:.72}

  @keyframes saveSpin{to{transform:rotate(360deg)}}
  @keyframes saveDone{0%{transform:scale(.92);opacity:.55}55%{transform:scale(1.05);opacity:1}100%{transform:scale(1)}}
  #statAutosave.motion-saving::before{content:"";display:inline-block;width:7px;height:7px;margin-right:5px;border:1px solid #8290a3;border-top-color:transparent;border-radius:50%;animation:saveSpin 650ms linear infinite}
  #statAutosave.motion-saved{animation:saveDone 220ms var(--motion-ease)}
  @keyframes generateSpin{to{transform:rotate(360deg)}}
  .topbar [data-act="gen-vhdl"].motion-working::before{content:"";display:inline-block;width:10px;height:10px;margin-right:7px;border:1.5px solid #fff;border-top-color:transparent;border-radius:50%;vertical-align:-1px;animation:generateSpin 600ms linear infinite}
  .topbar [data-act="gen-vhdl"].motion-done{box-shadow:0 0 0 2px #49b98255}

  .ux-minimap svg{transition:filter var(--motion-ui),opacity var(--motion-ui)}
  .ux-minimap:active svg{filter:brightness(1.25);opacity:.85}
  .canvas-host.ux-drop-ready::after{content:"Release to place";position:absolute;left:50%;top:12px;transform:translateX(-50%);padding:4px 8px;border:1px solid #4772a7;border-radius:3px;background:#142235e8;color:#9fc4f6;font-size:10px;animation:commandPanelIn 150ms var(--motion-ease);z-index:9}

  body.ux-no-motion *,body.ux-no-motion *::before,body.ux-no-motion *::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}

<script>
(function functionalMotionLayer(){
  "use strict";
  const MOTION_KEY="schstudio.motion.enabled";
  const reduceSystem=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let enabled=true;try{enabled=localStorage.getItem(MOTION_KEY)!=="0"&&!reduceSystem}catch(_){}
  document.body.classList.toggle("ux-no-motion",!enabled);
  const motionOK=()=>!document.body.classList.contains("ux-no-motion")&&!reduceSystem;

  /* A persistent motion toggle sits beside the density control. */
  const densityBtn=document.querySelector('.ux-activity [data-rail="density"]');
  if(densityBtn){const motionBtn=document.createElement("button");motionBtn.dataset.motionToggle="";motionBtn.dataset.tip="Motion: "+(enabled?"on":"off");motionBtn.innerHTML='<span class="ux-density-mark">FX</span>';motionBtn.classList.toggle("active",enabled);densityBtn.parentNode.insertBefore(motionBtn,densityBtn);motionBtn.addEventListener("click",()=>{enabled=!enabled;document.body.classList.toggle("ux-no-motion",!enabled);motionBtn.classList.toggle("active",enabled);motionBtn.dataset.tip="Motion: "+(enabled?"on":"off");try{localStorage.setItem(MOTION_KEY,enabled?"1":"0")}catch(_){}toast("Motion "+(enabled?"enabled":"disabled"),"info")})}

  /* Component placement and selection confirmation. */
  let lastSelection=[...state.selection].sort().join("|");
  const motionBaseAddComp=addComp;
  addComp=function(){const id=motionBaseAddComp.apply(this,arguments);if(id&&motionOK())requestAnimationFrame(()=>document.querySelectorAll("#canvas .node.selected").forEach(n=>n.classList.add("motion-new")));return id};
  function decorateCanvasMotion(){
    const sig=[...state.selection].sort().join("|");
    if(sig!==lastSelection&&sig&&motionOK()){document.querySelectorAll("#canvas .node.selected").forEach(n=>n.classList.add("motion-select"));lastSelection=sig}else if(sig!==lastSelection)lastSelection=sig;
    document.body.classList.toggle("ux-wiring-active",!!state.pendingWire&&motionOK());
    if(state.pendingWire){const paths=[...document.querySelectorAll('#canvas > path[stroke="var(--accent-2)"][stroke-dasharray]')];paths[paths.length-1]?.classList.add("motion-current-wire")}
  }
  const motionBaseRender=render;render=function(){const out=motionBaseRender.apply(this,arguments);decorateCanvasMotion();return out};

  /* Stagger issue appearance after validation. */
  const motionBaseRenderErrors=renderErrors;
  renderErrors=function(list){const out=motionBaseRenderErrors.apply(this,arguments);if(motionOK())document.querySelectorAll("#errorsPane .err-item").forEach((el,i)=>{el.style.animationDelay=Math.min(i*28,220)+"ms";el.classList.add("motion-issue")});return out};

  const motionBaseToast=toast;
  toast=function(msg,kind,ms){const duration=ms||2400,out=motionBaseToast.apply(this,arguments),items=document.querySelectorAll("#toastStack .toast"),el=items[items.length-1];if(el)el.style.setProperty("--toast-ms",duration+"ms");return out};

  /* Autosave changes between a working indicator and a short completion pop. */
  const autoStatus=document.querySelector("#statAutosave");
  if(autoStatus)new MutationObserver(()=>{const saving=/รอ|saving|…/i.test(autoStatus.textContent);autoStatus.classList.toggle("motion-saving",saving);autoStatus.classList.toggle("motion-saved",!saving);if(!saving)setTimeout(()=>autoStatus.classList.remove("motion-saved"),260)}).observe(autoStatus,{childList:true,subtree:true,characterData:true});

  const genBtn=document.querySelector('.topbar [data-act="gen-vhdl"]');
  genBtn?.addEventListener("click",()=>{if(!motionOK())return;genBtn.classList.remove("motion-done");genBtn.classList.add("motion-working");requestAnimationFrame(()=>setTimeout(()=>{genBtn.classList.remove("motion-working");genBtn.classList.add("motion-done");setTimeout(()=>genBtn.classList.remove("motion-done"),500)},220))},{capture:true});

  /* Smooth minimap navigation replaces the immediate jump from V2. */
  const mapSvg=document.querySelector(".ux-minimap svg");
  mapSvg?.addEventListener("click",e=>{e.stopImmediatePropagation();const vb=(mapSvg.getAttribute("viewBox")||"").split(/\s+/).map(Number);if(vb.length!==4||vb.some(Number.isNaN))return;const r=mapSvg.getBoundingClientRect(),tx=vb[0]+(e.clientX-r.left)/r.width*vb[2],ty=vb[1]+(e.clientY-r.top)/r.height*vb[3],cr=canvas.getBoundingClientRect(),targetX=cr.width/2-tx*state.view.k,targetY=cr.height/2-ty*state.view.k;if(!motionOK()){state.view.x=targetX;state.view.y=targetY;render();return}const sx=state.view.x,sy=state.view.y,start=performance.now(),dur=190;const tick=now=>{const p=Math.min(1,(now-start)/dur),ease=1-Math.pow(1-p,3);state.view.x=sx+(targetX-sx)*ease;state.view.y=sy+(targetY-sy)*ease;render();if(p<1)requestAnimationFrame(tick)};requestAnimationFrame(tick)},{capture:true});

  decorateCanvasMotion();
})();
</script>
